
[agent]
 interval = "10s"

[[outputs.influxdb]]
 urls = ["http://influxdb:8086"]
 database = "weather"

[[inputs.mqtt_consumer]]
 servers = ["tcp://mqtt:1883"]

 # Accept data from any station: home/weather/{station_id}/{metric}
 topics = [
   "home/weather/+/+",
 ]

 data_format = "value"
 data_type = "float"

 name_override = "weather"

 # Extract both station ID and metric name from the MQTT topic
 # e.g. home/weather/m5fire-living-room/temp -> station=m5fire-living-room, metric=temp
 [[inputs.mqtt_consumer.topic_parsing]]
   topic = "home/weather/+/+"
   tags = "_/_/station/metric"
